- runFlow: ./_nav_progress.yaml
- runFlow: ./_nav_library.yaml
- assertVisible: "Game Library"
# Quick-access cards from progress/home
- runFlow: ./_nav_progress.yaml
- pressKey: Back
- assertVisible: "Add Game"
