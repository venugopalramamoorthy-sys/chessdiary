name: chessdiary
description: Your personal chess game journal powered by AI
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^4.0.0
  firebase_auth: ^6.0.0
  cloud_firestore: ^6.0.0
  firebase_storage: ^13.0.0

  # Auth
  google_sign_in: ^7.0.0

  # Networking (for Stockfish server + Gemini proxy calls)
  http: ^1.2.0

  # Image & File Picking
  image_picker: ^1.0.7
  file_picker: ^11.0.0
  permission_handler: ^11.3.0

  # UI
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0

  # Chess
  flutter_chess_board: ^1.0.1

  # Storage & Utils
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2
  path: ^1.9.0
  intl: ^0.19.0
  uuid: ^4.3.3
  percent_indicator: ^4.2.3
  fl_chart: ^0.70.2
  share_plus: ^10.0.0

  # Ads (Android only — not used on web)
  google_mobile_ads: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
